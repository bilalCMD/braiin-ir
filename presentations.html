<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Presentations — Braiin IR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="header-placeholder"></div>

<div class="page-header">
  <div class="wrap">
    <div class="breadcrumb"><a href="index.html">Home</a> › Presentations</div>
    <h1>Presentations &amp; Events</h1>
    <p>Investor presentations, earnings webcasts, and conference materials.</p>
  </div>
</div>

<section class="sec">
  <div class="wrap">
    <div class="two-col">
      <div class="panel">
        <h3><span class="pi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h20v14H2zM8 21h8M12 17v4"/></svg></span>Investor Presentations</h3>
        <div id="pressList"></div>
      </div>
      <div class="panel">
        <h3><span class="pi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>Upcoming Events</h3>
        <div id="eventsList"></div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="components.js"></script><script src="data.js"></script>
<script>
renderHeader('presentations.html'); renderFooter();

document.getElementById('pressList').innerHTML = PRESENTATIONS.map(p=>`
  <div class="doc-row">
    <div class="doc-dl-wrap">
      <div class="doc-icon">PDF</div>
      <div><div class="doc-name">${p.title}</div><div class="doc-meta">${p.date} · ${p.size}</div></div>
    </div>
    <span class="doc-dl"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></span>
  </div>`).join('');

document.getElementById('eventsList').innerHTML = EVENTS.map(e=>`
  <div class="event-row">
    <div class="ev-cal"><div class="m">${e.month}</div><div class="d">${e.day}</div></div>
    <div class="ev-info"><h4>${e.title}</h4><p>${e.details}</p></div>
  </div>`).join('');
</script>
</body></html>
