<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FAQ — Braiin IR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="header-placeholder"></div>
<div class="page-header">
  <div class="wrap">
    <div class="breadcrumb"><a href="index.html">Home</a> › Resources › FAQ</div>
    <h1>Frequently Asked Questions</h1>
    <p>Common investor questions about Braiin Limited and its securities.</p>
  </div>
</div>
<section class="sec">
  <div class="wrap">
    <div class="faq-list" id="faqList" style="max-width:820px"></div>
    <div style="margin-top:32px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 24px;max-width:820px;display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div>
        <div style="font-weight:600;margin-bottom:4px">Can't find your answer?</div>
        <p style="font-size:14px">Contact our Investor Relations team directly.</p>
      </div>
      <a href="contact.html" class="btn btn-primary btn-sm" style="flex-shrink:0">Contact IR Team →</a>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="components.js"></script><script src="data.js"></script>
<script>
renderHeader('faq.html'); renderFooter();
document.getElementById('faqList').innerHTML = FAQ.map((item,i)=>`
  <div class="faq-item" id="faq${i}">
    <div class="faq-q" onclick="toggleFaq(${i})">
      <span>${item.q}</span>
      <span class="faq-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></span>
    </div>
    <div class="faq-a">${item.a}</div>
  </div>`).join('');

function toggleFaq(i) {
  document.getElementById('faq'+i).classList.toggle('open');
}
</script>
</body></html>
